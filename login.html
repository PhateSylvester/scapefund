<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scape-Trade Log In</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <section class="logbody">
        <header class="header">
            <img src="scape.jpg" alt="logo" height="80vh">
            <nav class="navbar">
                <a href="index.html"><img src="iconhome.png" height="30px" alt="home" title="HOME"></a>
            </nav>
        </header>
        <form class="loginform">
            <label for="name">Username</label>
            <input type="text" placeholder="username">
            <label for="password">Password</label>
            <input type="password" placeholder="******">
            <div class="formbtn">
                <button type="submit">Login</button>
            </div>
            <div class="register">
                <a href="">Forgot Password?</a>
                <p><i>Don't have account?</i><a href="">Register</a></p>
            </div>
        </form>
        <!--the footer page -->
        <footer class="logfoot">
            <ul class="logquick">
                <li><a href=""><img src="Icon -GitHub.png" alt="github" height="20px"></a></li>
                <li><a href=""><img src="Frame-twittter.png" alt="twitter" height="20px"></a></li>
                <li><a href=""><img src="Icon - Linkedin.png" alt="linkedin" height="20px"></a></li>
            </ul>
            <h1>&copy; 2026 SCAPE Inc, All rights reserved.</h1> 
        </footer>
    </section>
    <!-- screen size of 768px -->
    <div class="logbodys">
        <header class="headers">
            <img src="scape.jpg" alt="logo" height="80vh">
            <nav class="navbars">
                <a href="index.html"><img src="iconhome.png" height="30px" alt="home" title="HOME"></a>
            </nav>
        </header>
        <form class="loginforms">
            <label for="name">Username</label>
            <input type="text" placeholder="username"> <br>
            <label for="password">Password</label>
            <input type="password" placeholder="******">
            <div class="formbtns">
                <button type="submit">Login</button>
            </div>
            <div class="registers">
                <a href="">Forgot Password?</a>
                <p><i>Don't have account?</i><a href=""> <br>Register</a></p>
            </div>
        </form>
        <!--the footer page 768px -->
        <footer class="logfoots">
            <div class="foots-links">
                <ul class="log-quicks">
                    <li><a href=""><img src="Icon -GitHub.png" alt="github" height="20px"></a></li>
                    <li><a href=""><img src="Frame-twittter.png" alt="twitter" height="20px"></a></li>
                    <li><a href=""><img src="Icon - Linkedin.png" alt="linkedin" height="20px"></a></li>
                </ul>
                <h1>&copy; 2026 SCAPE, All rights reserved.</h1> 
            </div> 
        </footer>
    </div>
</body>
</html>
